version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/tests/IntegrationTests"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "integration-tests"
      - "x-unit"

  - package-ecosystem: "nuget"
    directory: "/tests/UnitTests"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "unit-tests"
      - "x-unit"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "github-actions"
        
  - package-ecosystem: "nuget"
    directory: "/src/Cli"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "cli"
        
  - package-ecosystem: "nuget"
    directory: "/src/GitService"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "GitService"
        
  - package-ecosystem: "nuget"
    directory: "/src/Shared"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "Shared"